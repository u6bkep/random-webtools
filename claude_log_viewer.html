<title>Claude Code Log Viewer</title>
<meta name="description" content="Browse and read Claude Code chat session logs (.jsonl).">
<style>
  :root {
    --bg: #1a1a1a; --bg2: #222; --bg3: #2a2a2a; --border: #3a3a3a;
    --fg: #e0e0e0; --muted: #888; --accent: #d97757; --link: #6ab0f3;
    --user: #2d4a3e; --asst: #2a2a2a; --tool: #2a2f3a; --think: #332d3a;
    --code-bg: #161616; --green: #7ec699; --red: #e06c75; --yellow: #e5c07b;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--fg); height: 100vh; display: flex; overflow: hidden; }
  button { font: inherit; cursor: pointer; background: var(--bg3); color: var(--fg);
           border: 1px solid var(--border); border-radius: 6px; padding: 5px 10px; }
  button:hover { border-color: var(--accent); }
  a { color: var(--link); }

  /* ---- Sidebar ---- */
  #sidebar { width: 320px; min-width: 160px; max-width: 70vw; background: var(--bg2);
             display: flex; flex-direction: column; height: 100%; flex-shrink: 0; }
  #resizer { width: 6px; cursor: col-resize; background: var(--border); flex-shrink: 0;
             transition: background .12s; }
  #resizer:hover, #resizer.dragging { background: var(--accent); }
  body.resizing { cursor: col-resize; user-select: none; }
  #sidebar-head { padding: 12px; border-bottom: 1px solid var(--border); }
  #sidebar-head h1 { font-size: 15px; margin: 0 0 10px; color: var(--accent); }
  #sidebar-head .btns { display: flex; gap: 6px; flex-wrap: wrap; }
  #drop { margin-top: 10px; padding: 10px; border: 1px dashed var(--border); border-radius: 6px;
          text-align: center; color: var(--muted); font-size: 12px; }
  #drop.over { border-color: var(--accent); color: var(--accent); }
  #filter { width: 100%; margin-top: 10px; padding: 6px 8px; background: var(--bg); color: var(--fg);
            border: 1px solid var(--border); border-radius: 6px; }
  .url-row { display: flex; gap: 6px; margin-top: 8px; }
  #url-input { flex: 1; min-width: 0; padding: 6px 8px; background: var(--bg); color: var(--fg);
               border: 1px solid var(--border); border-radius: 6px; font-size: 12px; }
  #open-url { flex-shrink: 0; }
  #sessions { overflow-y: auto; flex: 1; padding: 4px; }
  .proj-group > .proj-name { padding: 8px 10px 4px; font-size: 11px; text-transform: uppercase;
            letter-spacing: .05em; color: var(--muted); word-break: break-all; }
  .sess { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin: 1px 0; }
  .sess:hover { background: var(--bg3); }
  .sess.active { background: var(--tool); border-left: 3px solid var(--accent); }
  .sess .t { font-size: 13px; color: var(--fg); margin-bottom: 2px;
             overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sess .m { font-size: 11px; color: var(--muted); }

  /* ---- Main ---- */
  #main { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
  #toolbar { padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--bg2);
             display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  #toolbar .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; flex-wrap: wrap; }
  #toolbar .meta b { color: var(--fg); font-weight: 600; }
  #toolbar .meta .tok-sym { color: var(--accent); font-weight: 700; margin-right: 1px;
                            font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .toggles { display: flex; gap: 12px; align-items: center; margin-left: auto; font-size: 12px; }
  .toggles label { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
  #search { padding: 5px 8px; background: var(--bg); color: var(--fg); border: 1px solid var(--border);
            border-radius: 6px; width: 180px; }
  #scroll-area { position: relative; flex: 1; min-height: 0; display: flex; }
  #convo { overflow-y: auto; flex: 1; padding: 20px 24px; }
  #empty { color: var(--muted); text-align: center; margin-top: 80px; font-size: 15px; }
  /* pinned current user turn */
  #pin { position: absolute; top: 0; left: 0; right: 0; z-index: 20; cursor: pointer;
         display: flex; gap: 10px; align-items: center; padding: 8px 16px;
         background: var(--user); border-bottom: 2px solid var(--green);
         box-shadow: 0 3px 10px rgba(0,0,0,.45); }
  #pin.hidden { display: none; }
  #pin .pin-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em;
                    font-weight: 700; color: var(--green); flex-shrink: 0; }
  #pin .pin-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
                   white-space: nowrap; color: var(--fg); font-size: 13px; }
  #pin .pin-hint { flex-shrink: 0; font-size: 11px; color: var(--muted); }
  .msg.lane-right { scroll-margin-top: 52px; }

  /* ---- Messages ---- */
  .msg { margin: 0 auto 14px; max-width: 820px; border-radius: 8px; border: 1px solid var(--border);
         overflow: hidden; }
  /* SMS-style lanes: real user → right, assistant → left, harness/system → center */
  .msg.lane-right  { margin-left: auto;  margin-right: 0;    max-width: 78%; }
  .msg.lane-left   { margin-left: 0;     margin-right: auto; max-width: 78%; }
  .msg.lane-center { margin-left: auto;  margin-right: auto; max-width: 680px; opacity: .92; }
  .msg.user { background: var(--user); }
  .msg.assistant { background: var(--asst); }
  .msg.system { background: var(--bg2); }
  .msg.harness { background: var(--bg2); }
  .msg.sidechain { border-left: 3px solid var(--yellow); }
  .msg.lane-left.sidechain { margin-left: 36px; }
  .msg-head { padding: 6px 12px; font-size: 11px; font-weight: 600; letter-spacing: .04em;
              text-transform: uppercase; color: var(--muted); display: flex; gap: 10px; align-items: center; }
  .msg.user .msg-head { color: var(--green); }
  .msg.assistant .msg-head { color: var(--accent); }
  .msg-head .ts { font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: auto; }
  .msg-head .raw-btn { font-weight: 400; text-transform: none; letter-spacing: 0; cursor: pointer;
                       color: var(--muted); border: 1px solid var(--border); border-radius: 4px; padding: 0 6px; }
  .msg-body { padding: 4px 14px 12px; }
  .msg-body > *:first-child { margin-top: 0; }
  .msg-body > *:last-child { margin-bottom: 0; }

  /* markdown */
  .md p { margin: 8px 0; } .md ul, .md ol { margin: 8px 0; padding-left: 22px; }
  .md h1,.md h2,.md h3,.md h4 { margin: 14px 0 6px; line-height: 1.25; }
  .md code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; font-size: 12.5px;
             font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .md pre { background: var(--code-bg); padding: 10px 12px; border-radius: 6px; overflow-x: auto;
            border: 1px solid var(--border); }
  .md pre code { background: none; padding: 0; font-size: 12.5px; line-height: 1.45; }
  .md blockquote { border-left: 3px solid var(--border); margin: 8px 0; padding-left: 12px; color: var(--muted); }
  .md table { border-collapse: collapse; margin: 8px 0; }
  .md th, .md td { border: 1px solid var(--border); padding: 4px 8px; }
  .md img { max-width: 100%; border-radius: 6px; }
  .md a { word-break: break-word; }

  /* blocks */
  details.block { margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  details.block > summary { padding: 6px 10px; cursor: pointer; font-size: 12px; user-select: none;
                            display: flex; gap: 8px; align-items: center; }
  details.block > summary::-webkit-details-marker { display: none; }
  details.block > summary .chev { transition: transform .15s; color: var(--muted); }
  details.block[open] > summary .chev { transform: rotate(90deg); }
  details.block .inner { padding: 8px 10px; border-top: 1px solid var(--border); }
  .block.think { background: var(--think); }
  .block.tool { background: var(--tool); }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: var(--bg); color: var(--muted);
         border: 1px solid var(--border); }
  .tool-name { color: var(--link); font-family: ui-monospace, monospace; font-weight: 600; }
  .tool-desc { color: var(--muted); font-weight: 400; font-size: 12px; overflow: hidden;
               text-overflow: ellipsis; white-space: nowrap; min-width: 0; flex: 1; }
  details.block > summary .grow { flex: 1; min-width: 0; }
  pre.out { background: var(--code-bg); margin: 0; padding: 10px 12px; border-radius: 6px; overflow-x: auto;
            font-size: 12px; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
            font-family: ui-monospace, "SF Mono", Menlo, monospace; max-height: 480px; overflow-y: auto; }
  pre.out.err { border: 1px solid var(--red); }
  .kv { font-size: 12px; font-family: ui-monospace, monospace; }
  .kv .k { color: var(--yellow); }
  .raw-json { background: var(--code-bg); padding: 10px; border-radius: 6px; font-size: 11px;
              white-space: pre-wrap; word-break: break-word; max-height: 400px; overflow: auto;
              font-family: ui-monospace, monospace; margin: 6px 0; display: none; }
  .meta-line { max-width: 920px; margin: 0 auto 10px; text-align: center; font-size: 11px; color: var(--muted); }
  mark { background: var(--yellow); color: #000; border-radius: 2px; }
  .hidden { display: none !important; }
  .toolbar-img { max-width: 100%; border-radius: 6px; margin: 6px 0; display: block; }
</style>

<div id="sidebar">
  <div id="sidebar-head">
    <h1>Claude Code Log Viewer</h1>
    <div class="btns">
      <button id="open-dir" title="Browse a whole folder of logs">📁 Open folder</button>
      <button id="open-files">📄 Open files</button>
    </div>
    <input type="file" id="file-input" accept=".jsonl" multiple hidden>
    <div id="drop">drop .jsonl files here</div>
    <div class="url-row">
      <input id="url-input" placeholder="https://…/log.jsonl (raw)">
      <button id="open-url" title="Fetch a log from a URL and make it linkable">🔗</button>
    </div>
    <input id="filter" placeholder="filter sessions…">
  </div>
  <div id="sessions"></div>
</div>

<div id="resizer"></div>

<div id="main">
  <div id="toolbar">
    <div class="meta" id="meta"></div>
    <div class="toggles">
      <input id="search" placeholder="search in transcript…">
      <label><input type="checkbox" id="t-think"> thinking</label>
      <label><input type="checkbox" id="t-tool" checked> tools</label>
      <label><input type="checkbox" id="t-meta"> meta</label>
      <label><input type="checkbox" id="t-sys" checked> system</label>
    </div>
  </div>
  <div id="scroll-area">
    <div id="pin" class="hidden">
      <span class="pin-label">you</span>
      <span class="pin-text"></span>
      <span class="pin-hint">↑ jump</span>
    </div>
    <div id="convo"><div id="empty">Open a folder (e.g. <code>~/.claude/projects</code>) or drop a <code>.jsonl</code> session file to begin.</div></div>
  </div>
</div>

<script>
"use strict";

// ---------------------------------------------------------------- state
let SESSIONS = [];      // {id, title, project, file, events, mtime}
let CURRENT = null;
let USER_NODES = [];    // rendered true-user (.lane-right) message elements, for the sticky pin
let PIN_TARGET = null;  // the user message the pin currently points at

const $ = s => document.querySelector(s);
const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };

// ---------------------------------------------------------------- loading
$("#open-dir").onclick = async () => {
  if (!window.showDirectoryPicker) { alert("Your browser doesn't support folder picking. Use 'Open files' or drag-and-drop instead (try Chrome/Edge)."); return; }
  try {
    const dir = await window.showDirectoryPicker();
    const files = [];
    await walk(dir, "", files);
    await ingest(files);
  } catch (e) { if (e.name !== "AbortError") console.error(e); }
};
async function walk(handle, prefix, out) {
  for await (const entry of handle.values()) {
    if (entry.kind === "directory") await walk(entry, prefix ? prefix + "/" + entry.name : entry.name, out);
    else if (entry.name.endsWith(".jsonl")) {
      const f = await entry.getFile();
      out.push({ file: f, project: prefix || "(root)" });
    }
  }
}

$("#open-files").onclick = () => $("#file-input").click();
$("#file-input").onchange = e => ingest([...e.target.files].map(f => ({ file: f, project: projectFromName(f) })));

const drop = $("#drop");
["dragover","dragenter"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", async e => {
  const items = [...e.dataTransfer.files].filter(f => f.name.endsWith(".jsonl"));
  await ingest(items.map(f => ({ file: f, project: projectFromName(f) })));
});

function projectFromName(f) {
  // webkitRelativePath like "projects/-home-ben/uuid.jsonl"
  const p = f.webkitRelativePath || "";
  const parts = p.split("/");
  return parts.length > 1 ? parts[parts.length - 2] : "(dropped)";
}

// ---------------------------------------------------------------- load from URL
$("#open-url").onclick = () => loadUrl($("#url-input").value);
$("#url-input").addEventListener("keydown", e => { if (e.key === "Enter") loadUrl($("#url-input").value); });

function idFromUrl(url) {
  try {
    const u = new URL(url);
    const seg = u.pathname.split("/").filter(Boolean).pop() || u.hostname;
    return seg.replace(/\.jsonl$/, "");
  } catch (e) { return url.slice(0, 24); }
}

async function loadUrl(url, opts) {
  url = (url || "").trim();
  if (!url) return;
  const existing = SESSIONS.find(s => s.sourceUrl === url);
  if (existing) { selectSession(existing); return; }
  const btn = $("#open-url"), old = btn.textContent;
  btn.textContent = "…"; btn.disabled = true;
  try {
    const res = await fetch(url, { redirect: "follow" });
    if (!res.ok) throw new Error("HTTP " + res.status + " " + res.statusText);
    const text = await res.text();
    const events = parseJsonl(text);
    if (!events.length) throw new Error("no parseable JSONL lines (is this a raw log file?)");
    const id = idFromUrl(url);
    const s = { id, project: "🔗 web", events, sourceUrl: url,
      title: deriveTitle(events, id), mtime: 0,
      count: events.filter(e => e.type === "user" || e.type === "assistant").length };
    SESSIONS.push(s);
    renderSidebar();
    selectSession(s);
    $("#url-input").value = "";
  } catch (e) {
    const cors = (e instanceof TypeError);  // fetch throws TypeError on CORS/network failure
    alert("Couldn't load that URL:\n" + e.message +
      (cors ? "\n\nThis is likely a CORS or network error — the host must allow cross-origin requests. " +
              "Raw links from GitHub gists (raw.githubusercontent.com) and pastebin raw URLs usually work." : ""));
  } finally {
    btn.textContent = old; btn.disabled = false;
  }
}

// keep the address bar in sync so a web-loaded session is shareable
function syncUrl(s) {
  try {
    const u = new URL(location.href);
    if (s && s.sourceUrl) u.searchParams.set("url", s.sourceUrl);
    else u.searchParams.delete("url");
    history.replaceState(null, "", u);
  } catch (e) { /* file:// may reject replaceState in some browsers — ignore */ }
}

// ---------------------------------------------------------------- resizable sidebar
(function () {
  const resizer = $("#resizer"), sidebar = $("#sidebar");
  let dragging = false;
  resizer.addEventListener("mousedown", e => {
    dragging = true; resizer.classList.add("dragging"); document.body.classList.add("resizing");
    e.preventDefault();
  });
  window.addEventListener("mousemove", e => {
    if (!dragging) return;
    const w = Math.max(160, Math.min(e.clientX, window.innerWidth * 0.7));
    sidebar.style.width = w + "px";
  });
  window.addEventListener("mouseup", () => {
    if (!dragging) return;
    dragging = false; resizer.classList.remove("dragging"); document.body.classList.remove("resizing");
  });
})();

async function ingest(entries) {
  if (!entries.length) return;
  for (const { file, project } of entries) {
    try {
      const text = await file.text();
      const events = parseJsonl(text);
      if (!events.length) continue;
      const id = file.name.replace(/\.jsonl$/, "");
      // skip duplicates (same id + project)
      if (SESSIONS.some(s => s.id === id && s.project === project)) continue;
      SESSIONS.push({ id, project, events,
        title: deriveTitle(events, id),
        mtime: file.lastModified || 0,
        count: events.filter(e => e.type === "user" || e.type === "assistant").length });
    } catch (e) { console.error("parse fail", file.name, e); }
  }
  renderSidebar();
}

function parseJsonl(text) {
  const out = [];
  for (const line of text.split("\n")) {
    const s = line.trim();
    if (!s) continue;
    try { out.push(JSON.parse(s)); } catch (e) { /* skip malformed */ }
  }
  return out;
}

function plainText(content) {
  if (typeof content === "string") return content.trim();
  if (Array.isArray(content)) {
    return content.filter(b => b && b.type === "text").map(b => b.text || "").join(" ").trim();
  }
  return "";
}

function deriveTitle(events, id) {
  let title = null, firstPrompt = null;
  for (const e of events) {
    if (e.type === "ai-title" && e.aiTitle) title = e.aiTitle;
    if (e.type === "last-prompt" && e.lastPrompt) title = title || e.lastPrompt;
    if (!firstPrompt && e.type === "user" && !e.isMeta) {
      const t = plainText(e.message && e.message.content);
      if (t && !t.startsWith("<")) firstPrompt = t;
    }
  }
  return title || firstPrompt || id.slice(0, 8);
}

// ---------------------------------------------------------------- sidebar
$("#filter").oninput = renderSidebar;
function renderSidebar() {
  const q = $("#filter").value.toLowerCase();
  const wrap = $("#sessions");
  wrap.innerHTML = "";
  const byProj = {};
  for (const s of SESSIONS) {
    if (q && !(s.title.toLowerCase().includes(q) || s.project.toLowerCase().includes(q))) continue;
    (byProj[s.project] = byProj[s.project] || []).push(s);
  }
  const projNames = Object.keys(byProj).sort();
  for (const pn of projNames) {
    const g = el("div", "proj-group");
    g.appendChild(el("div", "proj-name", prettyProj(pn)));
    byProj[pn].sort((a, b) => b.mtime - a.mtime);
    for (const s of byProj[pn]) {
      const d = el("div", "sess");
      if (CURRENT === s) d.classList.add("active");
      d.appendChild(el("div", "t", s.title));
      const m = el("div", "m");
      m.textContent = `${s.count} msgs` + (s.mtime ? " · " + new Date(s.mtime).toLocaleString() : "");
      d.appendChild(m);
      d.onclick = () => selectSession(s);
      g.appendChild(d);
    }
    wrap.appendChild(g);
  }
  if (!projNames.length) wrap.innerHTML = '<div style="padding:14px;color:var(--muted);font-size:12px">No sessions.</div>';
}
function prettyProj(p) {
  // "-home-ben-Documents-foo" -> "/home/ben/Documents/foo"
  if (/^-/.test(p)) return p.replace(/-/g, "/");
  return p;
}

// ---------------------------------------------------------------- render transcript
function selectSession(s) {
  CURRENT = s;
  renderSidebar();
  renderConvo();
  syncUrl(s);
}

["t-think","t-tool","t-meta","t-sys"].forEach(id => $("#"+id).onchange = renderConvo);
$("#search").oninput = applySearch;
$("#convo").addEventListener("scroll", updatePin, { passive: true });
$("#pin").addEventListener("click", () => {
  if (PIN_TARGET) PIN_TARGET.scrollIntoView({ behavior: "smooth", block: "start" });
});

function renderConvo() {
  const convo = $("#convo");
  convo.innerHTML = "";
  if (!CURRENT) { convo.innerHTML = '<div id="empty">No session selected.</div>'; $("#meta").innerHTML = ""; return; }
  renderMeta(CURRENT);

  const showThink = $("#t-think").checked, showTool = $("#t-tool").checked,
        showMeta = $("#t-meta").checked, showSys = $("#t-sys").checked;

  for (const ev of CURRENT.events) {
    if (ev.type === "user" || ev.type === "assistant") {
      if (ev.isMeta && !showMeta) continue;
      const node = renderMessage(ev, { showThink, showTool, showMeta });
      if (node) convo.appendChild(node);
    } else if (ev.type === "system" && showSys) {
      const node = renderSystem(ev);
      if (node) convo.appendChild(node);
    } else if (ev.type === "attachment" && showMeta) {
      const node = renderAttachment(ev);
      if (node) convo.appendChild(node);
    }
  }
  if (!convo.children.length) convo.innerHTML = '<div id="empty">Nothing to show with current filters.</div>';
  applySearch();
  convo.scrollTop = 0;
  USER_NODES = [...convo.querySelectorAll(".msg.lane-right")];
  updatePin();
}

// Sticky header showing the most recent true-user turn scrolled past.
function updatePin() {
  const convo = $("#convo"), pin = $("#pin");
  if (!USER_NODES.length) { pin.classList.add("hidden"); PIN_TARGET = null; return; }
  const top = convo.getBoundingClientRect().top;
  let current = null;
  for (const n of USER_NODES) {
    // pin a message once its top edge has scrolled above the viewport top
    if (n.getBoundingClientRect().top - top < 1) current = n; else break;
  }
  if (!current) { pin.classList.add("hidden"); PIN_TARGET = null; return; }
  PIN_TARGET = current;
  pin.querySelector(".pin-text").textContent = current._pinText || current.textContent.trim();
  pin.classList.remove("hidden");
}

function renderMeta(s) {
  const ev = s.events;
  let model = "", version = "", branch = "", cwd = "";
  let inTok = 0, outTok = 0, cacheR = 0, durationMs = 0;
  let firstTs = null, lastTs = null;
  for (const e of ev) {
    if (e.message && e.message.model) model = e.message.model;
    if (e.version) version = e.version;
    if (e.gitBranch) branch = e.gitBranch;
    if (e.cwd) cwd = e.cwd;
    if (e.timestamp) { firstTs = firstTs || e.timestamp; lastTs = e.timestamp; }
    if (e.type === "system" && e.subtype === "turn_duration") durationMs += e.durationMs || 0;
    const u = e.message && e.message.usage;
    if (u) { inTok += u.input_tokens || 0; outTok += u.output_tokens || 0; cacheR += u.cache_read_input_tokens || 0; }
  }
  const fmt = n => n >= 1000 ? (n/1000).toFixed(1) + "k" : "" + n;
  const dur = durationMs ? Math.round(durationMs/1000) + "s" : "";
  const parts = [];
  if (model) parts.push(`<b>${esc(model)}</b>`);
  if (cwd) parts.push(`cwd <b>${esc(cwd)}</b>`);
  if (branch) parts.push(`git <b>${esc(branch)}</b>`);
  const tok = (sym, n, t) => `<span class="tok-sym" title="${t}">${sym}</span><b>${fmt(n)}</b>`;
  parts.push(`tokens ${tok("↓", inTok, "input tokens")} ${tok("↑", outTok, "output tokens")}`
             + (cacheR ? ` ${tok("⟳", cacheR, "cache read")}` : ""));
  if (dur) parts.push(`turns <b>${dur}</b>`);
  if (version) parts.push(`v${esc(version)}`);
  if (firstTs) parts.push(new Date(firstTs).toLocaleString());
  parts.push(`session <b title="${esc(s.id)}.jsonl">${esc(s.id)}</b>`);
  $("#meta").innerHTML = parts.map(p => `<span>${p}</span>`).join("");
}

// classify a user/assistant event into an SMS-style lane:
//   right  = a real, human-typed user message
//   left   = assistant output
//   center = harness messages: tool results, slash-commands, meta/caveats
function classifyLane(ev) {
  if (ev.type === "assistant") return "left";
  if (ev.type !== "user") return "center";
  if (ev.isMeta) return "center";
  if (ev.isCompactSummary) return "center";                   // compaction continuation summary
  // newer logs carry structured provenance — trust it first
  if (ev.promptSource === "system") return "center";          // task-notifications, etc.
  const okind = ev.origin && ev.origin.kind;
  if (okind === "human") return "right";                      // typed / queued / suggestion-accepted
  if (okind) return "center";                                 // any non-human origin
  // older logs (no origin): fall back to content inspection
  const c = ev.message && ev.message.content;
  if (Array.isArray(c)) {
    const hasToolResult = c.some(b => b && b.type === "tool_result");
    const hasText = c.some(b => b && b.type === "text" && (b.text || "").trim());
    return (hasToolResult && !hasText) ? "center" : "right";
  }
  if (typeof c === "string") {
    if (/<command-name>|<local-command-stdout>|<local-command-caveat>|<command-message>|<command-args>|<task-notification>|<system-reminder>/.test(c)) return "center";
    return c.trim() ? "right" : "center";
  }
  return "center";
}
function laneLabel(ev, lane) {
  if (lane === "right") return "you";
  if (ev.type === "assistant") return "claude";
  if (ev.isCompactSummary) return "compact summary";
  const okind = ev.origin && ev.origin.kind;
  if (okind && okind !== "human") return okind;               // e.g. task-notification
  if (ev.promptSource === "system") return "system";
  const c = ev.message && ev.message.content;
  if (Array.isArray(c) && c.some(b => b && b.type === "tool_result")) return "tool result";
  return "harness";
}

function renderMessage(ev, opts) {
  const m = ev.message || {};
  const sidechain = ev.isSidechain;
  const lane = classifyLane(ev);
  const bgType = (ev.type === "user" && lane !== "right") ? "harness" : ev.type;
  const wrap = el("div", `msg ${bgType} lane-${lane}` + (sidechain ? " sidechain" : ""));

  const head = el("div", "msg-head");
  head.appendChild(el("span", null, laneLabel(ev, lane) + (sidechain ? " · sub-agent" : "")));
  if (ev.type === "assistant" && m.model) head.appendChild(el("span", "tag", m.model));
  if (ev.isMeta) head.appendChild(el("span", "tag", "meta"));
  const ts = el("span", "ts", ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : "");
  head.appendChild(ts);
  const rawBtn = el("span", "raw-btn", "{ }");
  head.appendChild(rawBtn);
  wrap.appendChild(head);

  const body = el("div", "msg-body");
  const content = m.content;
  let rendered = false;

  if (typeof content === "string") {
    body.appendChild(renderTextChunk(content, ev));
    rendered = true;
  } else if (Array.isArray(content)) {
    for (const b of content) {
      const node = renderBlock(b, ev, opts);
      if (node) { body.appendChild(node); rendered = true; }
    }
  }
  if (!rendered) return null;

  const raw = el("pre", "raw-json", JSON.stringify(ev, null, 2));
  body.appendChild(raw);
  rawBtn.onclick = () => { raw.style.display = raw.style.display === "block" ? "none" : "block"; };

  wrap.appendChild(body);
  if (lane === "right") {
    const t = typeof content === "string" ? content : plainText(content);
    wrap._pinText = t.replace(/\s+/g, " ").trim();
  }
  return wrap;
}

function renderBlock(b, ev, opts) {
  if (!b || typeof b !== "object") return null;
  switch (b.type) {
    case "text":
      return renderTextChunk(b.text || "", ev);
    case "thinking": {
      if (!opts.showThink) return null;
      const d = mkDetails("think", "💭 thinking", false);
      d.querySelector(".inner").appendChild(mdNode(b.thinking || "(empty)"));
      return d;
    }
    case "tool_use": {
      if (!opts.showTool) return null;
      const d = mkDetails("tool", "", false);
      const sum = d.querySelector("summary");
      sum.appendChild(el("span", "tag", "tool →"));
      sum.appendChild(el("span", "tool-name", b.name || "tool"));
      const desc = toolSummary(b.name, b.input || {});
      if (desc) sum.appendChild(el("span", "tool-desc", desc));
      const inner = d.querySelector(".inner");
      inner.appendChild(renderToolInput(b.name, b.input || {}));
      return d;
    }
    case "tool_result": {
      if (!opts.showTool) return null;
      const isErr = b.is_error;
      const d = mkDetails("tool", "", false);
      const sum = d.querySelector("summary");
      sum.appendChild(el("span", "tag", isErr ? "result ✗" : "result ←"));
      const preview = resultPreview(b.content);
      if (preview) sum.appendChild(el("span", "tool-desc", preview));
      const inner = d.querySelector(".inner");
      inner.appendChild(renderToolResult(b.content, isErr));
      return d;
    }
    case "image":
      return renderImageBlock(b);
    default: {
      const d = mkDetails("tool", "", false);
      d.querySelector("summary").appendChild(el("span", "tag", b.type || "?"));
      d.querySelector(".inner").appendChild(Object.assign(el("pre", "out"), { textContent: JSON.stringify(b, null, 2) }));
      return d;
    }
  }
}

function renderTextChunk(text, ev) {
  // strip / annotate command markup
  const cmd = text.match(/<command-name>([^<]*)<\/command-name>/);
  if (cmd) {
    const c = el("div", "kv");
    c.innerHTML = `<span class="k">command</span> <code>${esc(cmd[1].trim())}</code>`;
    const args = text.match(/<command-args>([^<]*)<\/command-args>/);
    if (args && args[1].trim()) c.innerHTML += ` <code>${esc(args[1].trim())}</code>`;
    return c;
  }
  if (text.includes("<local-command-stdout>")) {
    const out = text.replace(/<\/?local-command-stdout>/g, "").trim();
    return Object.assign(el("pre", "out"), { textContent: out || "(no output)" });
  }
  // strip wrapper tags but keep content for caveats/system reminders
  const cleaned = text
    .replace(/<local-command-caveat>[\s\S]*?<\/local-command-caveat>/g, "")
    .trim();
  if (!cleaned) return el("div", "kv", "(empty)");
  return mdNode(cleaned);
}

// one-line gist of a tool call, shown in the collapsed summary
function toolSummary(name, input) {
  if (input && typeof input.description === "string" && input.description.trim())
    return input.description.trim();
  const primary = { Bash: "command", Read: "file_path", Edit: "file_path", Write: "file_path",
                    Grep: "pattern", Glob: "pattern", Task: "description", Agent: "description",
                    WebFetch: "url", WebSearch: "query", Skill: "skill" }[name];
  let v = primary && input ? input[primary] : null;
  if (v == null && input) { const k = Object.keys(input)[0]; v = k ? input[k] : null; }
  if (typeof v !== "string") return "";
  v = v.replace(/\s+/g, " ").trim();
  return v.length > 140 ? v.slice(0, 140) + "…" : v;
}
function resultPreview(content) {
  let s = "";
  if (typeof content === "string") s = content;
  else if (Array.isArray(content)) {
    const t = content.find(b => b && b.type === "text");
    if (t) s = t.text || "";
    else if (content.some(b => b && b.type === "image")) return "🖼 image";
  }
  s = (s || "").trim();
  if (!s) return "";
  const firstLine = s.split("\n").find(l => l.trim()) || s;
  const out = firstLine.length > 140 ? firstLine.slice(0, 140) + "…" : firstLine;
  const lines = s.split("\n").length;
  return lines > 1 ? `${out}  ·  ${lines} lines` : out;
}

function renderToolInput(name, input) {
  const frag = document.createDocumentFragment();
  // Highlight the most useful field per common tool
  const primary = { Bash: "command", Read: "file_path", Edit: "file_path", Write: "file_path",
                    Grep: "pattern", Glob: "pattern", Task: "description", Agent: "description" }[name];
  for (const [k, v] of Object.entries(input)) {
    const isPrim = k === primary;
    const big = typeof v === "string" && (v.includes("\n") || v.length > 80 || isPrim);
    const row = el("div");
    if (big) {
      row.innerHTML = `<div class="kv"><span class="k">${esc(k)}</span></div>`;
      row.appendChild(Object.assign(el("pre", "out"), { textContent: typeof v === "string" ? v : JSON.stringify(v, null, 2) }));
    } else {
      row.className = "kv";
      row.innerHTML = `<span class="k">${esc(k)}</span> ${esc(typeof v === "string" ? v : JSON.stringify(v))}`;
    }
    frag.appendChild(row);
  }
  return frag;
}

function renderToolResult(content, isErr) {
  if (typeof content === "string")
    return Object.assign(el("pre", "out" + (isErr ? " err" : "")), { textContent: content || "(empty)" });
  if (Array.isArray(content)) {
    const frag = document.createDocumentFragment();
    for (const b of content) {
      if (b && b.type === "text") frag.appendChild(Object.assign(el("pre", "out" + (isErr ? " err" : "")), { textContent: b.text || "" }));
      else if (b && b.type === "image") frag.appendChild(renderImageBlock(b));
      else frag.appendChild(Object.assign(el("pre", "out"), { textContent: JSON.stringify(b, null, 2) }));
    }
    return frag;
  }
  return Object.assign(el("pre", "out"), { textContent: JSON.stringify(content, null, 2) });
}

function renderImageBlock(b) {
  const src = b.source || {};
  if (src.type === "base64" && src.data)
    return Object.assign(el("img", "toolbar-img"), { src: `data:${src.media_type || "image/png"};base64,${src.data}` });
  if (src.type === "url" && src.url)
    return Object.assign(el("img", "toolbar-img"), { src: src.url });
  return el("div", "kv", "(image)");
}

function renderSystem(ev) {
  if (ev.subtype === "away_summary") {
    const m = el("div", "msg system");
    m.innerHTML = `<div class="msg-head"><span>recap</span><span class="ts">${ev.timestamp ? new Date(ev.timestamp).toLocaleTimeString() : ""}</span></div>`;
    const body = el("div", "msg-body");
    body.appendChild(mdNode(ev.content || ""));
    m.appendChild(body);
    return m;
  }
  if (ev.subtype === "turn_duration") {
    return el("div", "meta-line", `— turn: ${Math.round((ev.durationMs||0)/1000)}s, ${ev.messageCount||0} messages —`);
  }
  if (ev.subtype === "local_command") return null; // shown via stdout text instead
  if (ev.content) {
    const m = el("div", "msg system");
    m.innerHTML = `<div class="msg-head"><span>system · ${esc(ev.subtype||"")}</span></div>`;
    const body = el("div", "msg-body");
    body.appendChild(mdNode(String(ev.content)));
    m.appendChild(body);
    return m;
  }
  return null;
}

// pull a {label, content} out of an attachment event. content is a string when
// the event actually embeds file/text/listing data; null when it's label-only.
function attachmentInfo(a) {
  const t = a.type || "?";
  const asText = v => typeof v === "string" ? v : (v == null ? null : JSON.stringify(v, null, 2));
  switch (t) {
    case "file":
      return { label: `📎 file · ${a.displayPath || a.filename || ""}`,
               content: asText(a.content && a.content.file && a.content.file.content) };
    case "nested_memory":
      return { label: `🧠 memory · ${a.displayPath || a.path || ""}`,
               content: asText(a.content && a.content.content) };
    case "selected_lines_in_ide":
      return { label: `✂️ IDE selection · ${a.displayPath || a.filename || ""} (lines ${a.lineStart}–${a.lineEnd})`,
               content: asText(a.content) };
    case "opened_file_in_ide":
      return { label: `📂 opened in IDE · ${a.filename || ""}`, content: null };
    case "compact_file_reference":
      return { label: `📄 file referenced · ${a.displayPath || a.filename || ""}`, content: null };
    case "edited_text_file":
      return { label: `✏️ edited · ${a.filename || ""}`, content: asText(a.snippet) };
    case "queued_command":
      return { label: `⌨️ queued (${a.commandMode || "prompt"})`, content: asText(a.prompt) };
    case "plan_file_reference":
      return { label: `📋 plan · ${a.planFilePath || ""}`, content: asText(a.planContent) };
    case "plan_mode": return { label: `📋 plan mode (${a.reminderType || ""})`, content: null };
    case "plan_mode_exit": return { label: `📋 exited plan mode`, content: null };
    case "diagnostics":
      return { label: `🩺 diagnostics`, content: asText(a.files) };
    case "invoked_skills":
      return { label: `🧩 skills invoked: ${(a.skills || []).map(s => s.name).join(", ")}`,
               content: (a.skills || []).map(s => `### ${s.name}\n${s.content || ""}`).join("\n\n") || null };
    case "skill_listing":
      return { label: `🧩 skill listing (${a.skillCount || (a.names||[]).length || ""})`, content: asText(a.content) };
    case "agent_listing_delta":
      return { label: `🤖 agent listing (+${(a.addedTypes||[]).length})`, content: (a.addedLines || []).join("\n") || null };
    case "deferred_tools_delta":
      return { label: `🔧 deferred tools (+${(a.addedNames||[]).length})`, content: (a.addedNames || []).join("\n") || null };
    case "mcp_instructions_delta":
      return { label: `🔌 MCP instructions: ${(a.addedNames||[]).join(", ")}`, content: (a.addedBlocks || []).join("\n\n") || null };
    case "task_reminder": {
      const c = Array.isArray(a.content) ? (a.content.length ? asText(a.content) : null) : asText(a.content);
      return { label: `✅ task reminder (${a.itemCount ?? 0})`, content: c };
    }
    case "command_permissions":
      return { label: `🔒 permissions: ${(a.allowedTools||[]).join(", ") || "none"}`, content: null };
    case "date_change": return { label: `📅 date → ${a.newDate || ""}`, content: null };
    case "auto_mode": return { label: `⚙️ auto mode`, content: null };
    case "workflow_keyword_request": return { label: `⚙️ workflow keyword request`, content: null };
    default: {
      const c = a.content != null ? asText(a.content) : null;
      return { label: `📎 ${t}`, content: c };
    }
  }
}

function renderAttachment(ev) {
  const a = ev.attachment || {};
  const { label, content } = attachmentInfo(a);
  if (!content) {
    const m = el("div", "meta-line", label);
    return m;
  }
  const wrap = el("div", "msg harness lane-center");
  const head = el("div", "msg-head");
  head.appendChild(el("span", null, label));
  if (ev.timestamp) head.appendChild(el("span", "ts", new Date(ev.timestamp).toLocaleTimeString()));
  const rawBtn = el("span", "raw-btn", "{ }");
  head.appendChild(rawBtn);
  wrap.appendChild(head);
  const body = el("div", "msg-body");
  const d = mkDetails("tool", "", false);
  d.querySelector("summary").appendChild(el("span", "tool-desc", resultPreview(content) || "show content"));
  d.querySelector(".inner").appendChild(Object.assign(el("pre", "out"), { textContent: content }));
  body.appendChild(d);
  const raw = el("pre", "raw-json", JSON.stringify(ev, null, 2));
  body.appendChild(raw);
  rawBtn.onclick = () => { raw.style.display = raw.style.display === "block" ? "none" : "block"; };
  wrap.appendChild(body);
  return wrap;
}

function mkDetails(cls, summaryText, open) {
  const d = el("details", "block " + cls);
  if (open) d.open = true;
  const sum = el("summary");
  sum.appendChild(Object.assign(el("span", "chev"), { textContent: "▶" }));
  if (summaryText) sum.appendChild(el("span", null, summaryText));
  d.appendChild(sum);
  const inner = el("div", "inner");
  d.appendChild(inner);
  return d;
}

// ---------------------------------------------------------------- search
function applySearch() {
  const q = $("#search").value.trim();
  const convo = $("#convo");
  // clear old marks
  convo.querySelectorAll("mark").forEach(m => { const p = m.parentNode; p.replaceChild(document.createTextNode(m.textContent), m); p.normalize(); });
  convo.querySelectorAll(".msg").forEach(m => m.classList.remove("hidden"));
  if (!q) return;
  const ql = q.toLowerCase();
  convo.querySelectorAll(".msg").forEach(msg => {
    const hit = msg.textContent.toLowerCase().includes(ql);
    if (!hit) { msg.classList.add("hidden"); return; }
    highlight(msg, ql);
  });
}
function highlight(root, ql) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode: n => (n.parentNode.classList && n.parentNode.classList.contains("raw-json")) ? NodeFilter.FILTER_REJECT
                   : n.nodeValue.toLowerCase().includes(ql) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP });
  const nodes = []; let n; while ((n = walker.nextNode())) nodes.push(n);
  for (const node of nodes) {
    const txt = node.nodeValue, low = txt.toLowerCase();
    const frag = document.createDocumentFragment(); let i = 0, idx;
    while ((idx = low.indexOf(ql, i)) !== -1) {
      if (idx > i) frag.appendChild(document.createTextNode(txt.slice(i, idx)));
      frag.appendChild(Object.assign(el("mark"), { textContent: txt.slice(idx, idx + ql.length) }));
      i = idx + ql.length;
    }
    if (i < txt.length) frag.appendChild(document.createTextNode(txt.slice(i)));
    node.parentNode.replaceChild(frag, node);
  }
}

// ---------------------------------------------------------------- tiny markdown
function mdNode(src) {
  const div = el("div", "md");
  div.innerHTML = md(src);
  return div;
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function md(src) {
  src = String(src);
  // protect fenced code blocks
  const blocks = [];
  src = src.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
    blocks.push(`<pre><code>${esc(code.replace(/\n$/, ""))}</code></pre>`);
    return `␀B${blocks.length - 1}␀`;
  });
  const lines = src.split("\n");
  let out = [], i = 0;
  while (i < lines.length) {
    let line = lines[i];
    if (/^␀B\d+␀$/.test(line.trim())) { out.push(line.trim()); i++; continue; }
    // headings
    let h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { out.push(`<h${h[1].length}>${inline(h[2])}</h${h[1].length}>`); i++; continue; }
    // blockquote
    if (/^>\s?/.test(line)) {
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) { buf.push(lines[i].replace(/^>\s?/, "")); i++; }
      out.push(`<blockquote>${md(buf.join("\n"))}</blockquote>`); continue;
    }
    // lists
    if (/^\s*[-*+]\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) { buf.push(`<li>${inline(lines[i].replace(/^\s*[-*+]\s+/, ""))}</li>`); i++; }
      out.push(`<ul>${buf.join("")}</ul>`); continue;
    }
    if (/^\s*\d+\.\s+/.test(line)) {
      const buf = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) { buf.push(`<li>${inline(lines[i].replace(/^\s*\d+\.\s+/, ""))}</li>`); i++; }
      out.push(`<ol>${buf.join("")}</ol>`); continue;
    }
    if (line.trim() === "") { i++; continue; }
    // paragraph (gather consecutive non-blank, non-special lines)
    const buf = [line]; i++;
    while (i < lines.length && lines[i].trim() !== "" && !/^(␀B\d+␀|#{1,6}\s|>\s?|\s*[-*+]\s|\s*\d+\.\s)/.test(lines[i])) { buf.push(lines[i]); i++; }
    out.push(`<p>${inline(buf.join("\n"))}</p>`);
  }
  let html = out.join("\n");
  html = html.replace(/␀B(\d+)␀/g, (m, n) => blocks[+n]);
  return html;
}
function inline(s) {
  s = esc(s);
  s = s.replace(/`([^`]+)`/g, (m, c) => `<code>${c}</code>`);
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2">');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
  s = s.replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>");
  s = s.replace(/\n/g, "<br>");
  return s;
}

// ---------------------------------------------------------------- auto-load shared link
(function initFromUrl() {
  const shared = new URLSearchParams(location.search).get("url");
  if (shared) { $("#url-input").value = shared; loadUrl(shared); }
})();
